<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>In-Game Editor — Hierarchy Mockup</title>
<style>
  :root {
    --bg: #0d1218; --panel: #161e27; --hover: #1f2a36;
    --text: #d9e2ea; --dim: #7b8794; --sep: rgba(120,200,215,0.08);
    --accent: #56c8d8; --good: #4fc38a;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07090c; color: var(--text);
    font: 14px/1.45 -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    display: flex; justify-content: center; align-items: flex-start; padding: 24px;
  }

  /* ---- device frame ---- */
  .phone {
    width: 390px; height: 844px; background: #000; border-radius: 54px;
    padding: 7px; flex: none; box-shadow: 0 0 0 2px #2a2f36, 0 24px 60px rgba(0,0,0,.6);
  }
  .screen {
    background: var(--bg); border-radius: 47px; height: 100%;
    display: flex; flex-direction: column; overflow: hidden; position: relative;
  }
  .notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; background: #000; border-radius: 20px; z-index: 5;
  }
  .statusbar { flex: none; height: 52px; }
  .homebar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 5px; border-radius: 3px; background: #333d47; z-index: 5;
  }
  .body { flex: 1; overflow-y: auto; padding: 2px 16px 48px; }
  .body::-webkit-scrollbar { display: none; }

  /* ---- nav ---- */
  .navline { display: flex; align-items: center; min-height: 32px; padding: 4px 2px; }
  .back {
    color: var(--accent); cursor: pointer; user-select: none;
    font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  }
  .plus { margin-left: auto; color: var(--accent); font-size: 22px; line-height: 1; cursor: pointer; user-select: none; padding: 0 4px; }
  .bigtitle {
    font-size: 19px; font-weight: 800; margin: 2px 4px 16px;
    letter-spacing: 2.5px; text-transform: uppercase;
  }
  .roothead { display: flex; align-items: center; padding: 0 2px 14px; }
  .roothead .rtitle { font-size: 19px; font-weight: 800; flex: 1; letter-spacing: 2.5px; text-transform: uppercase; }
  .prompt { font-family: var(--mono); color: #fff; margin-right: 9px; letter-spacing: 0; }
  .close {
    width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,.08);
    color: var(--dim); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; user-select: none;
  }
  .close:hover { background: rgba(255,255,255,.16); color: var(--text); }

  /* ---- top hero band (home) ---- */
  .hero {
    background: linear-gradient(150deg, #20303c, #131b24 70%);
    margin: 0 -16px 14px; padding: 62px 16px 8px;
  }
  .hero .list { background: rgba(255,255,255,.055); }
  .hero .cell + .cell { border-top-color: rgba(255,255,255,.07); }

  /* ---- horizontal tile scroller ---- */
  .scroller {
    display: flex; gap: 10px; overflow-x: auto;
    margin: 0 -16px 12px; padding: 0 16px;
  }
  .scroller::-webkit-scrollbar { display: none; }
  .scroller .tile { flex: none; width: 150px; }

  /* ---- sections + lists ---- */
  .sectionlabel {
    margin: 18px 4px 8px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--dim);
  }
  .list { background: var(--panel); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
  .cell { display: flex; align-items: center; gap: 10px; padding: 11px 14px; min-height: 46px; }
  .cell + .cell { border-top: 1px solid var(--sep); }
  .cell.tap { cursor: pointer; }
  .cell.tap:hover { background: var(--hover); }
  .label { flex: 1; }
  .label b { font-weight: 700; }
  .v { color: var(--dim); font-size: 12px; font-family: var(--mono); }
  .v.refv { color: var(--accent); }
  .v.varv { color: var(--good); }
  .count { color: var(--dim); font-size: 11px; font-family: var(--mono); background: rgba(120,200,215,0.09); border-radius: 4px; padding: 2px 7px; }
  .chev { color: #46525e; font-size: 15px; }
  .sign { flex: none; font-size: 12px; }
  .sign.up { color: var(--good); }
  .sign.down { color: #d06a6a; }

  /* ---- tile grid (chamfered) ---- */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
  .tile {
    background: var(--panel); border-radius: 4px; padding: 13px 13px 11px;
    cursor: pointer; position: relative;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  }
  .tile:hover { background: var(--hover); }
  .tile .temoji { font-size: 20px; margin-bottom: 10px; }
  .tile .tname { font-weight: 600; }
  .tile .tcount { position: absolute; top: 14px; right: 18px; color: var(--dim); font-size: 11px; font-family: var(--mono); }
  .tile .tswatch { height: 36px; border-radius: 3px; margin-bottom: 10px; }
  .tile.compact { padding: 11px 13px; }
  .tile.compact .tname { font-weight: 500; font-size: 13px; }
  .tile::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: rgba(0,0,0,.2);
  }
  .tile.edited::before { background: #dcb63f; }

  /* ---- chips ---- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 2px 6px; }
  .chip {
    background: var(--panel); border-radius: 6px; padding: 6px 13px;
    cursor: pointer; font-size: 13px; user-select: none;
  }
  .chip:hover { background: var(--hover); }
  .chip.add { background: transparent; border: 1px dashed #38434e; color: var(--dim); }

  /* ---- flow (target → action) ---- */
  .flow { display: flex; align-items: stretch; gap: 8px; margin-bottom: 10px; }
  .flow .arrow { color: var(--dim); align-self: center; flex: none; }
  .flowtile {
    flex: 1; background: var(--panel); border-radius: 4px; padding: 10px 12px; cursor: pointer;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
  }
  .flowtile:hover { background: var(--hover); }
  .flowtile .fcap { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--dim); margin-bottom: 2px; }
  .flowtile .fval { font-weight: 600; color: var(--good); }

  /* ---- controls ---- */
  .seg { display: flex; background: #0f151c; border-radius: 6px; padding: 2px; flex: none; }
  .seg span { padding: 3px 12px; border-radius: 4px; font-size: 12px; color: var(--dim); }
  .seg span.on { background: #2a3745; color: var(--text); }
  .stepper { display: flex; align-items: center; gap: 10px; flex: none; }
  .stepper span { width: 24px; height: 24px; border-radius: 6px; background: #2a3745; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
  .stepper b { min-width: 16px; text-align: center; font-family: var(--mono); }
  .ctl-slider { flex: none; width: 90px; height: 3px; background: #2e3945; border-radius: 2px; position: relative; }
  .ctl-slider em { position: absolute; left: 0; height: 100%; background: var(--accent); border-radius: 2px; }
  .ctl-slider i { position: absolute; top: -5px; width: 13px; height: 13px; border-radius: 4px; background: #b6c2cc; margin-left: -6px; }
  .ctl-toggle { flex: none; width: 36px; height: 20px; border-radius: 5px; background: var(--accent); position: relative; }
  .ctl-toggle.off { background: #2e3945; }
  .ctl-toggle i { position: absolute; right: 2px; top: 2px; width: 16px; height: 16px; border-radius: 4px; background: #fff; }
  .ctl-toggle.off i { right: auto; left: 2px; }
  .ctl-swatch { flex: none; width: 26px; height: 18px; border-radius: 4px; }

  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--accent); color: var(--text);
    border-radius: 8px; padding: 8px 16px; opacity: 0; transition: opacity .2s; pointer-events: none;
    font-size: 13px; z-index: 10;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="notch"></div>
    <div class="body" id="body"></div>
    <div class="homebar"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let stack = ['home'];

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1400);
}

const go = id => { stack.push(id); render(); };
const pop = () => { if (stack.length > 1) { stack.pop(); render(); } };

/* ---------- builders ---------- */
let handlers = {};
let hid = 0;
function on(fn) { const k = 'h' + (hid++); handlers[k] = fn; return k; }

const section = t => `<div class="sectionlabel">${t}</div>`;
const list = rows => `<div class="list">${rows.join('')}</div>`;
const grid = tiles => `<div class="grid">${tiles.join('')}</div>`;
const scroller = tiles => `<div class="scroller">${tiles.join('')}</div>`;
const chips = items => `<div class="chips">${items.join('')}</div>`;

function nav(label, opts = {}) {
  const { to, detail = '', count = null, sign = '' } = opts;
  const h = on(() => to ? go(to) : toast('Not mocked'));
  return `<div class="cell tap" data-h="${h}">
    <div class="label">${label}</div>
    ${sign ? `<div class="sign ${sign}">${sign === 'up' ? '▲' : '▼'}</div>` : ''}
    ${detail ? `<div class="v">${detail}</div>` : ''}
    ${count !== null ? `<div class="count">${count}</div>` : ''}
    <div class="chev">›</div></div>`;
}

function tile(name, opts = {}) {
  const { to, emoji, count = null, swatch, compact = false, edited = false } = opts;
  const h = on(() => to ? go(to) : toast('Not mocked'));
  return `<div class="tile${compact ? ' compact' : ''}${edited ? ' edited' : ''}" data-h="${h}">
    ${count !== null ? `<div class="tcount">${count}</div>` : ''}
    ${swatch ? `<div class="tswatch" style="background:${swatch}"></div>` : ''}
    ${emoji ? `<div class="temoji">${emoji}</div>` : ''}
    <div class="tname">${name}</div></div>`;
}

function chip(label, opts = {}) {
  const { to, add = false, menu } = opts;
  const h = on(() => {
    if (menu) go(menu);
    else if (to) go(to);
    else if (add) toast('Added');
    else go('kind:' + label.split(' ')[0]);
  });
  return `<div class="chip${add ? ' add' : ''}" data-h="${h}">${add ? '＋' : label}</div>`;
}

function flowTile(caption, value, to) {
  const h = on(() => go(to));
  return `<div class="flowtile" data-h="${h}"><div class="fcap">${caption}</div><div class="fval">${value}</div></div>`;
}
const flow = tiles => `<div class="flow">${tiles.join('<div class="arrow">›</div>')}</div>`;

function scalar(kind, label, value, opts = {}) {
  const { off = false, pct = 55 } = opts;
  let ctl = `<div class="v">${value}</div>`;
  if (kind === 'slider') ctl = `<div class="v">${value}</div><div class="ctl-slider"><em style="width:${pct}%"></em><i style="left:${pct}%"></i></div>`;
  if (kind === 'toggle') ctl = `<div class="ctl-toggle${off ? ' off' : ''}"><i></i></div>`;
  if (kind === 'color') ctl = `<div class="ctl-swatch" style="background:${value}"></div>`;
  if (kind === 'dropdown') ctl = `<div class="v">${value} ▾</div>`;
  return `<div class="cell"><div class="label">${label}</div>${ctl}</div>`;
}

function seg(label, options, onIndex) {
  const spans = options.map((o, i) => `<span class="${i === onIndex ? 'on' : ''}">${o}</span>`).join('');
  return `<div class="cell"><div class="label">${label}</div><div class="seg">${spans}</div></div>`;
}

function stepper(label, value) {
  return `<div class="cell"><div class="label">${label}</div>
    <div class="stepper"><span data-h="${on(() => toast('−1'))}">−</span><b>${value}</b><span data-h="${on(() => toast('+1'))}">＋</span></div></div>`;
}

function ref(label, value, pickerId) {
  const h = on(() => go(pickerId));
  return `<div class="cell tap" data-h="${h}">
    <div class="label">${label}</div>
    <div class="v refv">${value}</div><div class="chev">›</div></div>`;
}

function variant(label, kind, editorId, menuId) {
  const hRow = on(() => editorId ? go(editorId) : go(menuId));
  return `<div class="cell tap" data-h="${hRow}">
    <div class="label">${label}</div>
    <div class="v varv">${kind}</div>
    <div class="chev">›</div></div>`;
}

function pickRow(label, opts = {}) {
  const { msg, swatch } = opts;
  const h = on(() => { pop(); toast(msg || `Picked: ${label}`); });
  return `<div class="cell tap" data-h="${h}">
    ${swatch ? `<div class="ctl-swatch" style="background:${swatch}"></div>` : ''}
    <div class="label">${label}</div><div class="chev">›</div></div>`;
}

function kindTile(kind, to) {
  return tile(kind, { to: to || 'kind:' + kind, compact: true });
}

function pickTile(name) {
  const h = on(() => { pop(); toast(`Picked: ${name}`); });
  return `<div class="tile compact" data-h="${h}"><div class="tname">${name}</div></div>`;
}

/* ---------- screens ---------- */
const SCREENS = {

home: () => ({ title: '', rows: [
  `<div class="hero">
    <div class="roothead">
      <div class="rtitle"><span class="prompt">&gt;_</span>Debug</div>
      <div class="close" data-h="${on(() => toast('Closed'))}">✕</div>
    </div>
    ${list([
      scalar('slider', 'Time Scale', '1.0×', { pct: 50 }),
      scalar('toggle', 'Verbose Logging', '', { off: true }),
      scalar('toggle', 'Skip Intro', ''),
    ])}
    ${list([
      ref('Quick Match', 'default', 'pick_match_configs'),
      ref('Starship', 'freighter', 'pick_starships'),
    ])}
  </div>`,
  section('Content'),
  scroller([
    tile('Starships', { emoji: '🛸', count: 0 }),
    tile('Modules', { emoji: '🧱', count: 0 }),
    tile('Module Grids', { emoji: '🔲', count: 0 }),
    tile('Tiles', { emoji: '🎨', to: 'cat_tiles', count: 5 }),
  ]),
  section('Effects'),
  scroller([
    tile('Abilities', { emoji: '⚡', to: 'cat_abilities', count: 5 }),
    tile('Statuses', { emoji: '✨', to: 'cat_statuses', count: 3, edited: true }),
    tile('Stats', { emoji: '📊', to: 'cat_stats', count: 13 }),
    tile('Resources', { emoji: '🔋', to: 'cat_resources', count: 5 }),
  ]),
  section('Rules'),
  scroller([
    tile('Rulesets', { emoji: '📜', to: 'cat_rulesets', count: 7, edited: true }),
    tile('Match Configs', { emoji: '🚀', count: 0 }),
  ]),
]}),

pick_match_configs: () => ({ title: 'Quick Match', rows: [
  list([ pickRow('default'), pickRow('alternate') ]),
]}),

pick_starships: () => ({ title: 'Starship', rows: [
  list([ pickRow('freighter'), pickRow('interceptor') ]),
]}),

/* --- Statuses --- */
cat_statuses: () => ({ title: 'Statuses', action: { fn: () => go('ed_status') }, rows: [
  list([
    nav('dodge', { to: 'ed_status', sign: 'up' }),
    nav('shield', { to: 'ed_status', sign: 'up' }),
    nav('target_lock', { to: 'ed_status', sign: 'down' }),
  ]),
]}),

ed_status: () => ({ title: 'shield', rows: [
  list([
    scalar('text', 'Name', 'shield'),
    seg('Sign', ['Buff', 'Debuff'], 0),
    stepper('Cap', 3),
  ]),
  list([
    variant('Stacking', 'Stack', null, 'menu_stackrule'),
    variant('Decay', 'Timing', null, 'menu_decayrule'),
  ]),
  section('Modifiers'),
  chips([ chip('Armor +5', { to: 'ed_modifier' }), chip('', { add: true }) ]),
  section('Effects'),
  chips([ chip('WhenHit › Dodge', { to: 'kind:TriggeredEffect' }), chip('', { add: true }) ]),
  section('Transforms'),
  chips([ chip('', { add: true, menu: 'menu_step' }) ]),
]}),

ed_modifier: () => ({ title: 'Modifier', rows: [
  list([
    ref('Stat', 'Armor', 'pick_stats'),
    seg('Operation', ['Add', 'Multiply'], 0),
    scalar('slider', 'Amount', '5', { pct: 25 }),
  ]),
]}),

pick_stats: () => ({ title: 'Stat', rows: [
  grid(['armor', 'block', 'defense', 'energy', 'fuel', 'health', 'power', 'sensors', 'speed', 'weapons'].map(s => pickTile(s))),
]}),

/* --- Stats --- */
cat_stats: () => ({ title: 'Stats', action: { fn: () => go('ed_stat') }, rows: [
  list(['armor', 'block', 'cargo', 'defense', 'energy', 'fuel', 'health', 'life_support', 'power', 'sensors', 'speed', 'warp_capacity', 'weapons'].map(s =>
    nav(s, { to: 'ed_stat' }))),
]}),

ed_stat: () => ({ title: 'health', rows: [
  list([
    scalar('text', 'Name', 'health'),
    scalar('slider', 'Minimum', '0', { pct: 0 }),
    scalar('slider', 'Maximum', '40', { pct: 40 }),
    scalar('slider', 'Default', '40', { pct: 40 }),
  ]),
]}),

/* --- Resources --- */
cat_resources: () => ({ title: 'Resources', action: { fn: () => go('ed_resource') }, rows: [
  list(['combat', 'propulsion', 'science', 'shields', 'warp'].map(s =>
    nav(s, { to: 'ed_resource' }))),
]}),

ed_resource: () => ({ title: 'combat', rows: [
  list([
    scalar('text', 'Name', 'combat'),
  ]),
]}),

/* --- Abilities --- */
cat_abilities: () => ({ title: 'Abilities', action: { fn: () => go('ed_ability') }, rows: [
  list([
    nav('evasive_maneuvers', { to: 'ed_ability', detail: '8' }),
    nav('fire_weapons', { to: 'ed_ability', detail: '10' }),
    nav('raise_shields', { to: 'ed_ability', detail: '12' }),
    nav('repair_hull', { to: 'ed_ability', detail: '15' }),
    nav('target_lock', { to: 'ed_ability', detail: '6' }),
  ]),
]}),

ed_ability: () => ({ title: 'fire_weapons', rows: [
  list([ scalar('text', 'Name', 'fire_weapons') ]),
  section('Costs'),
  chips([ chip('10 × combat', { to: 'ed_cost' }), chip('', { add: true }) ]),
  section('Effects'),
  flow([
    flowTile('Target', 'Opponent', 'ed_effect'),
    flowTile('Action', 'Attack', 'ed_effect'),
  ]),
  chips([ chip('', { add: true }) ]),
]}),

ed_cost: () => ({ title: 'Cost', rows: [
  list([
    ref('Resource', 'Combat', 'pick_resources'),
    scalar('slider', 'Amount', '10', { pct: 50 }),
  ]),
]}),

pick_resources: () => ({ title: 'Resource', rows: [
  grid(['combat', 'propulsion', 'science', 'shields', 'warp'].map(s => pickTile(s))),
]}),

ed_effect: () => ({ title: 'Effect', rows: [
  flow([
    flowTile('Target', 'Opponent', 'menu_target'),
    flowTile('Action', 'Attack', 'ed_attack'),
  ]),
  section('Conditions'),
  chips([ chip('', { add: true, menu: 'menu_condition' }) ]),
]}),

ed_attack: () => ({ title: 'Attack', rows: [
  list([
    variant('Amount', 'max(weapons)', null, 'menu_amount'),
  ]),
]}),

/* --- Tiles --- */
cat_tiles: () => ({ title: 'Tiles', action: { fn: () => go('ed_tile') }, rows: [
  grid([
    tile('combat', { swatch: '#c05656', to: 'ed_tile' }),
    tile('propulsion', { swatch: '#c08a3e', to: 'ed_tile' }),
    tile('science', { swatch: '#4d9e6a', to: 'ed_tile' }),
    tile('shields', { swatch: '#4d7fc0', to: 'ed_tile' }),
    tile('warp', { swatch: '#8a63c0', to: 'ed_tile' }),
  ]),
]}),

ed_tile: () => ({ title: 'shields', rows: [
  list([
    scalar('text', 'Name', 'shields'),
    scalar('color', 'Color', '#4d7fc0'),
  ]),
]}),

/* --- Rulesets --- */
cat_rulesets: () => ({ title: 'Rulesets', rows: [
  section('Game Modes'),
  grid([
    tile('default', { to: 'ed_ruleset' }),
    tile('alternate', { to: 'ed_ruleset' }),
  ]),
  section('Fragments'),
  list([
    nav('default_tiles'),
    nav('default_special_tiles'),
    nav('default_ability_resources'),
    nav('default_turns'),
  ]),
]}),

ed_ruleset: () => ({ title: 'default', action: { fn: () => go('menu_rule') }, rows: [
  list([
    `<div class="cell"><div class="label"><b>Scoring</b></div><div class="v">Linear ▾</div><div class="ctl-toggle"><i></i></div></div>`,
    `<div class="cell"><div class="label"><b>Damage</b></div><div class="v">2</div><div class="ctl-slider"><em style="width:20%"></em><i style="left:20%"></i></div><div class="ctl-toggle"><i></i></div></div>`,
    `<div class="cell"><div class="label"><b>Spawn — Combat</b></div><div class="v">3</div><div class="ctl-slider"><em style="width:30%"></em><i style="left:30%"></i></div><div class="ctl-toggle"><i></i></div></div>`,
  ]),
]}),

menu_rule: () => ({ title: 'Add Rule', rows: [
  grid(['Scoring', 'Damage', 'Extra Turn', 'Action Budget', 'Board Fill', 'Resource Capacity', 'Scrap Grant', 'Territory', 'Tile Match', 'Tile Spawn', 'Warp', 'Offset Scoring', 'Reload Split', 'Selection'].map(k =>
    tile(k, { compact: true, to: 'ed_newrule' }))),
]}),

ed_newrule: () => ({ title: 'Damage', rows: [
  list([
    scalar('slider', 'Per tile', '2', { pct: 20 }),
    seg('On collision', ['Replace', 'Stack'], 0),
    scalar('toggle', 'Enabled', ''),
  ]),
]}),

};

/* --- kind menus, generated as grids --- */
const MENUS = {
  menu_target: ['Self', 'Opponent', 'Instigator', 'Chosen', 'Chosen Ally', 'All Entities', 'All Allies', 'All Opponents', 'Random Ally', 'Random Opponent', 'Highest Stat', 'Lowest Stat', 'Sides'],
  menu_condition: ['Stat Threshold', 'Compare Stats', 'Has Status', 'Chance', 'And', 'Or', 'Not'],
  menu_amount: ['Constant', 'Current Stat', 'Maximum Stat', 'Missing Stat', 'Random', 'Math', 'Modification', 'Status Count'],
  menu_stackrule: ['Stack', 'Replace', 'Keep Highest'],
  menu_decayrule: ['Timing', 'Threshold', 'Trigger'],
  menu_step: ['Absorb', 'Clamp', 'Flat Mitigation', 'Multiplier'],
};
const MENU_TITLES = { menu_target: 'Target', menu_condition: 'Condition', menu_amount: 'Amount', menu_stackrule: 'Stacking', menu_decayrule: 'Decay', menu_step: 'Transform' };

for (const [id, kinds] of Object.entries(MENUS)) {
  SCREENS[id] = () => ({ title: MENU_TITLES[id], rows: [
    grid(kinds.map(k => kindTile(k))),
  ]});
}

SCREENS.menu_action = () => ({ title: 'Action', rows: [
  section('Match'),
  grid(['Attack', 'Shield', 'Dodge', 'Drain', 'Damage Buff', 'Disable'].map(k => kindTile(k, k === 'Attack' ? 'ed_attack' : undefined))),
  section('Core'),
  grid(['Apply Status', 'Remove Status', 'Remove By Sign', 'Modify Stat', 'Set Stat', 'Drain Resource'].map(k => kindTile(k))),
]});

/* fallback editor for any kind not mocked in detail */
function genericKind(kind) {
  return { title: kind, rows: [
    list([
      scalar('slider', 'Value', '…', { pct: 40 }),
      scalar('dropdown', 'Mode', '…'),
    ]),
  ]};
}

/* ---------- render ---------- */
function screenFor(id) {
  return SCREENS[id] ? SCREENS[id]() : genericKind(id.replace(/^kind:/, ''));
}

function render() {
  handlers = {}; hid = 0;
  const screen = screenFor(stack[stack.length - 1]);

  let html = stack.length > 1 ? '<div class="statusbar"></div>' : '';
  if (stack.length > 1 || screen.action) {
    const prevTitle = stack.length > 1 ? (screenFor(stack[stack.length - 2]).title || 'Debug') : '';
    const backHtml = stack.length > 1 ? `<div class="back" data-h="${on(pop)}">‹ ${prevTitle}</div>` : '';
    const plusHtml = screen.action ? `<div class="plus" data-h="${on(screen.action.fn)}">＋</div>` : '';
    html += `<div class="navline">${backHtml}${plusHtml}</div>`;
  }
  if (screen.title) html += `<div class="bigtitle">${screen.title}</div>`;
  html += screen.rows.join('');

  const body = $('body');
  body.innerHTML = html;
  body.querySelectorAll('[data-h]').forEach(el => {
    el.addEventListener('click', ev => {
      ev.stopPropagation();
      handlers[el.dataset.h]();
    });
  });
  body.scrollTop = 0;
}

render();
</script>
</body>
</html>
