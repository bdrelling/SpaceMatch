<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>In-Game Editor — Hierarchy Mockup</title>
<style>
  :root {
    --bg: #0d1218; --panel: #161e27; --hover: #1f2a36;
    --text: #d9e2ea; --dim: #7b8794; --sep: rgba(120,200,215,0.08);
    --accent: #56c8d8; --good: #4fc38a;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07090c; color: var(--text);
    font: 14px/1.45 -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    display: flex; justify-content: center; align-items: flex-start; padding: 24px; gap: 28px;
  }

  /* ---- device frame ---- */
  .phone {
    width: 390px; height: 844px; background: #000; border-radius: 54px;
    padding: 7px; flex: none; box-shadow: 0 0 0 2px #2a2f36, 0 24px 60px rgba(0,0,0,.6);
  }
  .screen {
    background: var(--bg); border-radius: 47px; height: 100%;
    display: flex; flex-direction: column; overflow: hidden; position: relative;
  }
  .notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; background: #000; border-radius: 20px; z-index: 5;
  }
  .statusbar { flex: none; height: 52px; }
  .homebar {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 5px; border-radius: 3px; background: #333d47; z-index: 5;
  }

  /* ---- side nav (viewer aid — outside the phone, jumps to any catalog) ---- */
  .stage { flex: 1; display: flex; justify-content: center; }
  .sidenav {
    flex: none; width: 208px; position: sticky; top: 24px; align-self: flex-start;
    color: var(--text);
  }
  .navbrand {
    display: flex; align-items: center; margin: 2px 0 12px 10px;
    font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; user-select: none;
  }
  .navbrand:hover { color: var(--accent); }
  .navbrand .prompt { font-family: var(--mono); color: #fff; margin-right: 8px; letter-spacing: 0; }
  .nav-section {
    margin: 16px 0 5px 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--dim);
  }
  .nav-item {
    padding: 7px 12px 7px 22px; border-left: 2px solid transparent; border-radius: 0 6px 6px 0;
    cursor: pointer; user-select: none; color: var(--text);
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active {
    color: var(--accent); font-weight: 600;
    background: rgba(86, 200, 216, 0.09); border-left-color: var(--accent);
  }
  .body { flex: 1; overflow-y: auto; padding: 2px 16px 48px; }
  .body::-webkit-scrollbar { display: none; }

  /* ---- nav ---- */
  .navline { display: flex; align-items: center; min-height: 32px; padding: 4px 2px; }
  .back {
    color: var(--accent); cursor: pointer; user-select: none;
    font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  }
  .plus { margin-left: auto; color: var(--accent); font-size: 22px; line-height: 1; cursor: pointer; user-select: none; padding: 0 4px; }
  .bigtitle {
    font-size: 19px; font-weight: 800; margin: 2px 4px 16px;
    letter-spacing: 2.5px; text-transform: uppercase;
  }
  .roothead { display: flex; align-items: center; padding: 0 2px 14px; }
  .roothead .rtitle { font-size: 19px; font-weight: 800; flex: 1; letter-spacing: 2.5px; text-transform: uppercase; }
  .prompt { font-family: var(--mono); color: #fff; margin-right: 9px; letter-spacing: 0; }
  .close {
    width: 30px; height: 30px; border-radius: 8px; background: rgba(255,255,255,.08);
    color: var(--dim); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; user-select: none;
  }
  .close:hover { background: rgba(255,255,255,.16); color: var(--text); }

  /* ---- top hero band (home) ---- */
  .hero {
    background: linear-gradient(150deg, #20303c, #131b24 70%);
    margin: 0 -16px 14px; padding: 62px 16px 8px;
  }
  .hero .list { background: rgba(255,255,255,.055); }
  .hero .cell + .cell { border-top-color: rgba(255,255,255,.07); }

  /* ---- horizontal tile scroller ---- */
  .scroller {
    display: flex; gap: 10px; overflow-x: auto;
    margin: 0 -16px 12px; padding: 0 16px;
  }
  .scroller::-webkit-scrollbar { display: none; }
  .scroller .tile { flex: none; width: 150px; }

  /* ---- sections + lists ---- */
  .sectionlabel {
    margin: 15px 4px 6px;
    font-size: 11px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; color: var(--dim);
  }
  .bigtitle + .sectionlabel { margin-top: 4px; }
  .divider { height: 1px; background: rgba(255,255,255,.09); margin: 4px 2px 16px; }
  /* group takes the tile silhouette: squared top/left/bottom, chamfered top-right,
     so the left-edge edit bar reads as one clean straight line */
  .list {
    background: var(--panel); overflow: hidden; margin-bottom: 10px;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  }
  .cell { display: flex; align-items: center; gap: 10px; padding: 11px 14px; min-height: 46px; position: relative; }
  .cell + .cell { border-top: 1px solid var(--sep); }
  .cell.tap { cursor: pointer; }
  .cell.tap:hover { background: var(--hover); }
  .label { flex: 1; }
  .label b { font-weight: 700; }
  .v { color: var(--dim); font-size: 12px; font-family: var(--mono); }
  .v.refv { color: var(--accent); }
  .v.varv { color: var(--good); }
  .count { color: var(--dim); font-size: 11px; font-family: var(--mono); background: rgba(120,200,215,0.09); border-radius: 4px; padding: 2px 7px; }
  .chev { color: #46525e; font-size: 15px; }
  .sign { flex: none; font-size: 12px; }
  .sign.up { color: var(--good); }
  .sign.down { color: #d06a6a; }
  /* every row carries the same left-edge edit bar as the menu tiles */
  .cell::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: rgba(0,0,0,.2);
  }
  .cell.edited::before { background: #dcb63f; }
  /* dimmed row — a stat not on the authored list (underlying / not yet decided) */
  .cell.dim .label { color: var(--dim); opacity: .7; }

  /* ---- tile grid (chamfered) ---- */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
  .tile {
    background: var(--panel); padding: 13px 13px 11px;
    cursor: pointer; position: relative;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  }
  .tile:hover { background: var(--hover); }
  .tile .temoji { font-size: 20px; margin-bottom: 10px; }
  .tile .tname { font-weight: 600; }
  .tile .tcount { position: absolute; top: 14px; right: 18px; color: var(--dim); font-size: 11px; font-family: var(--mono); }
  .tile .tswatch { height: 36px; border-radius: 3px; margin-bottom: 10px; }
  .tile.compact { padding: 11px 13px; }
  .tile.compact .tname { font-weight: 500; font-size: 13px; }
  .tile::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: rgba(0,0,0,.2);
  }
  .tile.edited::before { background: #dcb63f; }

  /* ---- chips ---- */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 2px 6px; }
  .chip {
    background: var(--panel); border-radius: 6px; padding: 6px 13px;
    cursor: pointer; font-size: 13px; user-select: none;
  }
  .chip:hover { background: var(--hover); }
  .chip.add { background: transparent; border: 1px dashed #38434e; color: var(--dim); }

  /* clear button — small, right by the close-button style, in its own footer section */
  .clearsec { margin: 24px 2px 4px; }
  .clearbtn {
    display: inline-flex; align-items: center; padding: 7px 18px; border-radius: 8px;
    background: rgba(255,255,255,.08); color: var(--dim); font-size: 13px; cursor: pointer; user-select: none;
  }
  .clearbtn:hover { background: rgba(208,106,106,.18); color: #e6a5a5; }
  /* add button — same footer style as clear, accent-tinted (create mode submit) */
  .addbtn { background: rgba(86,200,216,.16); color: var(--accent); }
  .addbtn:hover { background: rgba(86,200,216,.3); color: var(--accent); }
  /* picker footer row — create a new instance without leaving the pick flow */
  .cell.new .label { color: var(--accent); font-weight: 600; }

  /* ---- controls ---- */
  .seg { display: flex; background: #0f151c; border-radius: 6px; padding: 2px; flex: none; }
  .seg span { padding: 3px 12px; border-radius: 4px; font-size: 12px; color: var(--dim); }
  .seg span.on { background: #2a3745; color: var(--text); }
  .stepper { display: flex; align-items: center; gap: 10px; flex: none; }
  .stepper span { width: 24px; height: 24px; border-radius: 6px; background: #2a3745; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
  .stepper b { min-width: 16px; text-align: center; font-family: var(--mono); }
  .ctl-slider { flex: none; width: 72px; height: 3px; background: #2e3945; border-radius: 2px; position: relative; }
  .ctl-slider em { position: absolute; left: 0; height: 100%; background: var(--accent); border-radius: 2px; }
  .ctl-slider i { position: absolute; top: -5px; width: 13px; height: 13px; border-radius: 4px; background: #b6c2cc; margin-left: -6px; }
  .ctl-toggle { flex: none; width: 36px; height: 20px; border-radius: 5px; background: var(--accent); position: relative; }
  .ctl-toggle.off { background: #2e3945; }
  .ctl-toggle i { position: absolute; right: 2px; top: 2px; width: 16px; height: 16px; border-radius: 4px; background: #fff; }
  .ctl-toggle.off i { right: auto; left: 2px; }
  .ctl-swatch { flex: none; width: 26px; height: 18px; border-radius: 4px; }
  /* editable number box beside a slider — slide or type for precision */
  .numbox {
    flex: none; width: 44px; background: #0f151c; border: 1px solid #2e3945; border-radius: 5px;
    color: var(--text); font-family: var(--mono); font-size: 12px; text-align: center; padding: 3px 2px;
  }
  /* 2D texture preview placeholder (checkerboard = no art yet) */
  .ctl-texture {
    flex: none; width: 26px; height: 22px; border-radius: 4px;
    background:
      linear-gradient(45deg, #2a3745 25%, transparent 25%, transparent 75%, #2a3745 75%),
      linear-gradient(45deg, #2a3745 25%, #10161d 25%, #10161d 75%, #2a3745 75%);
    background-size: 10px 10px; background-position: 0 0, 5px 5px;
  }
  /* description field — label on top, wrapped copy below */
  .field-desc { flex-direction: column; align-items: stretch; gap: 4px; }
  .field-desc .desc { color: var(--dim); font-size: 13px; line-height: 1.4; }
  /* a row that carries an explanatory subtitle (e.g. Stacking / Decay) */
  .cell.hasdesc { flex-direction: column; align-items: stretch; gap: 4px; }
  .cell.hasdesc .toprow { display: flex; align-items: center; gap: 10px; }
  .sub { color: var(--dim); font-size: 12px; line-height: 1.35; }
  /* status tile symbol on a tinted chip (statuses carry a symbol + color) */
  .tile.status .ssym {
    width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 9px;
  }

  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--accent); color: var(--text);
    border-radius: 8px; padding: 8px 16px; opacity: 0; transition: opacity .2s; pointer-events: none;
    font-size: 13px; z-index: 10;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<nav class="sidenav" id="sidenav"></nav>

<div class="stage">
  <div class="phone">
    <div class="screen">
      <div class="notch"></div>
      <div class="body" id="body"></div>
      <div class="homebar"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let stack = ['home'];

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1400);
}

const go = id => { stack.push(id); render(); };
const pop = () => { if (stack.length > 1) { stack.pop(); render(); } };
const popN = n => { while (n-- > 0 && stack.length > 1) stack.pop(); render(); };

/* Screen ids are "base" or "base:item" — the item selects a row from the data
   tables below, so every catalog row opens its own page. */
const baseOf = id => String(id).split(':')[0];
const argOf = id => String(id).split(':')[1];

/* Logical parent of each screen — lets a deep link (e.g. screenshots) rebuild the
   full stack so the back link reads the real parent catalog, never a bare "Debug". */
const PARENTS = {
  pick_match_configs: 'home', pick_starships: 'home',
  cat_statuses: 'home', ed_status: 'cat_statuses', ed_newstatus: 'cat_statuses', ed_modifier: 'ed_status', pick_adjustment: 'ed_modifier',
  cat_adjustments: 'home', ed_adjustment: 'cat_adjustments', pick_stats: 'ed_adjustment', ed_newadjustment: 'cat_adjustments',
  cat_stats: 'home', ed_stat: 'cat_stats', ed_newstat: 'cat_stats',
  cat_resources: 'home', ed_resource: 'cat_resources', ed_newresource: 'cat_resources',
  cat_abilities: 'home', ed_ability: 'cat_abilities', ed_newability: 'cat_abilities', ed_cost: 'ed_ability', pick_resources: 'ed_cost',
  pick_effects: 'ed_ability', pick_transforms: 'ed_status',
  cat_actions: 'home', ed_action: 'cat_actions', ed_newaction: 'cat_actions', pick_actions: 'ed_effect',
  cat_effects: 'home', ed_effect: 'cat_effects', ed_neweffect: 'cat_effects',
  ed_condition: 'ed_effect', menu_condition_new: 'ed_effect', ed_newcondition: 'menu_condition_new', pick_statuses: 'ed_condition',
  cat_transforms: 'home', ed_transform: 'cat_transforms', ed_newtransform: 'cat_transforms',
  cat_targets: 'home', view_target: 'cat_targets',
  cat_conditions: 'home', view_condition: 'cat_conditions',
  cat_starships: 'home', ed_starship: 'cat_starships', ed_newstarship: 'cat_starships', pick_loadouts: 'ed_starship',
  cat_modules: 'home', ed_module: 'cat_modules', ed_newmodule: 'cat_modules',
  cat_loadouts: 'home', ed_loadout: 'cat_loadouts', ed_newloadout: 'cat_loadouts', pick_modules: 'ed_loadout',
  cat_tiles: 'home', ed_tile: 'cat_tiles', ed_newtile: 'cat_tiles', pick_tiles: 'ed_ruleinstance',
  cat_rules: 'home', view_ruletemplate: 'cat_rules', ed_selectionrule: 'cat_rules', ed_newselectionrule: 'cat_rules', pick_selrules: 'ed_ruleinstance',
  cat_rulesets: 'home', ed_ruleset: 'cat_rulesets', menu_rule: 'ed_ruleset', ed_newruleinstance: 'menu_rule',
  ed_ruleinstance: 'ed_ruleset', ed_newruleset: 'cat_rulesets',
  cat_match_configs: 'home', ed_matchconfig: 'cat_match_configs', ed_newmatchconfig: 'cat_match_configs', pick_rulesets: 'ed_matchconfig',
};
function deepLink(id) {
  const chain = [id];
  for (let p = PARENTS[baseOf(id)]; p; p = PARENTS[baseOf(p)]) chain.unshift(p);
  if (chain[0] !== 'home') chain.unshift('home');
  stack = chain;
  render();
}

/* ---------- builders ---------- */
let handlers = {};
let hid = 0;
function on(fn) { const k = 'h' + (hid++); handlers[k] = fn; return k; }

const section = t => `<div class="sectionlabel">${t}</div>`;
// filename (unique id) -> display name, e.g. target_lock -> "Target Lock"
const titleize = s => s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
const list = rows => `<div class="list">${rows.join('')}</div>`;
const grid = tiles => `<div class="grid">${tiles.join('')}</div>`;
const scroller = tiles => `<div class="scroller">${tiles.join('')}</div>`;
const chips = items => `<div class="chips">${items.join('')}</div>`;
const divider = () => `<div class="divider"></div>`;
const count = obj => Object.keys(obj).length;

function nav(label, opts = {}) {
  const { to, detail = '', count = null, sign = '', edited = false, dim = false } = opts;
  const h = on(() => to ? go(to) : toast('Not mocked'));
  return `<div class="cell tap${edited ? ' edited' : ''}${dim ? ' dim' : ''}" data-h="${h}">
    <div class="label">${label}</div>
    ${sign ? `<div class="sign ${sign}">${sign === 'up' ? '▲' : '▼'}</div>` : ''}
    ${detail ? `<div class="v">${detail}</div>` : ''}
    ${count !== null ? `<div class="count">${count}</div>` : ''}
    <div class="chev">›</div></div>`;
}

function tile(name, opts = {}) {
  const { to, emoji, count = null, swatch, compact = false, edited = false } = opts;
  const h = on(() => to ? go(to) : toast('Not mocked'));
  return `<div class="tile${compact ? ' compact' : ''}${edited ? ' edited' : ''}" data-h="${h}">
    ${count !== null ? `<div class="tcount">${count}</div>` : ''}
    ${swatch ? `<div class="tswatch" style="background:${swatch}"></div>` : ''}
    ${emoji ? `<div class="temoji">${emoji}</div>` : ''}
    <div class="tname">${name}</div></div>`;
}

function chip(label, opts = {}) {
  const { to, add = false, menu } = opts;
  const h = on(() => {
    if (menu) go(menu);
    else if (to) go(to);
    else toast('Added');
  });
  return `<div class="chip${add ? ' add' : ''}" data-h="${h}">${add ? '＋' : label}</div>`;
}

function scalar(kind, label, value, opts = {}) {
  const { off = false, pct = 55, edited = false, toggle = null, none = false } = opts;
  let ctl = `<div class="v">${value}</div>`;
  if (kind === 'slider') {
    // `none` = unbounded (no min / no max); toggle turns the bound on/off
    ctl = none
      ? `<div class="v">None</div>`
      : `<div class="ctl-slider"><em style="width:${pct}%"></em><i style="left:${pct}%"></i></div><input class="numbox" value="${value}">`;
    if (toggle !== null) ctl += `<div class="ctl-toggle${toggle ? '' : ' off'}"><i></i></div>`;
  }
  if (kind === 'toggle') ctl = `<div class="ctl-toggle${off ? ' off' : ''}"><i></i></div>`;
  if (kind === 'color') ctl = `<div class="ctl-swatch" style="background:${value}"></div>`;
  if (kind === 'dropdown') ctl = `<div class="v">${value} ▾</div>`;
  return `<div class="cell${edited ? ' edited' : ''}"><div class="label">${label}</div>${ctl}</div>`;
}

function descField(text) {
  return `<div class="cell field-desc"><div class="label">Description</div><div class="desc">${text}</div></div>`;
}

function clearBtn() {
  return `<div class="clearsec"><div class="clearbtn" data-h="${on(() => toast('Cleared'))}">Clear</div></div>`;
}

// picker footer row: create a new instance mid-pick
function newRow(label, to) {
  const h = on(() => go(to));
  return `<div class="cell tap new" data-h="${h}"><div class="label">＋ ${label}</div><div class="chev">›</div></div>`;
}

// create-mode submit: adds to the catalog, and — when reached through a picker —
// selects the new instance and returns to wherever the picker was opened
function addBtn(name) {
  const h = on(() => {
    const viaPicker = /^(pick_|menu_)/.test(String(stack[stack.length - 2]));
    popN(viaPicker ? 2 : 1);
    toast(viaPicker ? `Added & picked: ${name}` : `Added: ${name}`);
  });
  return `<div class="clearsec"><div class="clearbtn addbtn" data-h="${h}">Add</div></div>`;
}

function textureField(name) {
  const h = on(() => toast('Pick texture'));
  return `<div class="cell tap" data-h="${h}"><div class="label">Texture</div><div class="ctl-texture"></div><div class="v">${name}</div><div class="chev">›</div></div>`;
}

function statusTile(name, emoji, color, to, edited = false) {
  const h = on(() => go(to));
  return `<div class="tile status${edited ? ' edited' : ''}" data-h="${h}">
    <div class="ssym" style="background:${color}22;box-shadow:inset 0 0 0 1px ${color}88">${emoji}</div>
    <div class="tname">${name}</div></div>`;
}

function seg(label, options, onIndex, edited = false) {
  const spans = options.map((o, i) => `<span class="${i === onIndex ? 'on' : ''}">${o}</span>`).join('');
  return `<div class="cell${edited ? ' edited' : ''}"><div class="label">${label}</div><div class="seg">${spans}</div></div>`;
}

function stepper(label, value, edited = false) {
  return `<div class="cell${edited ? ' edited' : ''}"><div class="label">${label}</div>
    <div class="stepper"><span data-h="${on(() => toast('−1'))}">−</span><b>${value}</b><span data-h="${on(() => toast('+1'))}">＋</span></div></div>`;
}

function ref(label, value, pickerId) {
  const h = on(() => go(pickerId));
  return `<div class="cell tap" data-h="${h}">
    <div class="label">${label}</div>
    <div class="v refv">${value}</div><div class="chev">›</div></div>`;
}

function variant(label, kind, editorId, menuId, edited = false, desc = '') {
  const hRow = on(() => editorId ? go(editorId) : go(menuId));
  const head = `<div class="label"><b>${label}</b></div><div class="v varv">${kind}</div><div class="chev">›</div>`;
  if (!desc) return `<div class="cell tap${edited ? ' edited' : ''}" data-h="${hRow}">${head}</div>`;
  return `<div class="cell tap hasdesc${edited ? ' edited' : ''}" data-h="${hRow}">
    <div class="toprow">${head}</div>
    <div class="sub">${desc}</div></div>`;
}

function pickRow(label, opts = {}) {
  const { msg, swatch } = opts;
  const h = on(() => { pop(); toast(msg || `Picked: ${label}`); });
  return `<div class="cell tap" data-h="${h}">
    ${swatch ? `<div class="ctl-swatch" style="background:${swatch}"></div>` : ''}
    <div class="label">${label}</div><div class="chev">›</div></div>`;
}

function pickTile(name, emoji, swatch) {
  const h = on(() => { pop(); toast(`Picked: ${name}`); });
  return `<div class="tile${emoji || swatch ? '' : ' compact'}" data-h="${h}">
    ${swatch ? `<div class="tswatch" style="background:${swatch}"></div>` : ''}
    ${emoji ? `<div class="temoji">${emoji}</div>` : ''}
    <div class="tname">${name}</div></div>`;
}

// a picker option that carries an explanatory description (selects + returns)
function optRow(name, desc) {
  const h = on(() => { pop(); toast(`Picked: ${name}`); });
  return `<div class="cell tap hasdesc" data-h="${h}">
    <div class="toprow"><div class="label"><b>${name}</b></div><div class="chev">›</div></div>
    <div class="sub">${desc}</div></div>`;
}

// a described option that opens a page (kind views, create flows)
function optNav(name, desc, to) {
  const h = on(() => go(to));
  return `<div class="cell tap hasdesc" data-h="${h}">
    <div class="toprow"><div class="label"><b>${name}</b></div><div class="chev">›</div></div>
    <div class="sub">${desc || ''}</div></div>`;
}

const idOf = (base, table, key) => String(base + Object.keys(table).indexOf(key) + 1);
const identitySec = (base, table, key) => section('Identity') + list([scalar('text', 'ID', idOf(base, table, key)), scalar('text', 'Filename', key)]);
const infoSec = (name, desc) => section('Information') + list([scalar('text', 'Name', name), descField(desc)]);

// one row of a template/kind parameter — view (type only), edit (value), or new (unset)
function paramRow(p, mode, values = {}) {
  if (mode === 'view') return scalar('text', p.label, p.typeText);
  const v = values[p.label] !== undefined ? values[p.label] : p.value;
  if (p.kind === 'slider')  return scalar('slider', p.label, mode === 'new' ? '0' : v, { pct: mode === 'new' ? 0 : (p.pct || 30) });
  if (p.kind === 'seg')     return seg(p.label, p.options, 0);
  if (p.kind === 'stepper') return stepper(p.label, mode === 'new' ? 0 : v);
  if (p.kind === 'toggle')  return scalar('toggle', p.label, '', { off: mode === 'new' });
  if (p.kind === 'color')   return scalar('color', p.label, v);
  if (p.kind === 'ref')     return ref(p.label, mode === 'new' ? 'None' : v, p.picker);
  return scalar('text', p.label, mode === 'new' ? '—' : v);
}

  chips([ chip('', { add: true, menu: 'pick_rulesets' }) ]),
  addBtn('New Ruleset'),
]}),

// template picker: choose a rule template, then configure the new instance
menu_rule: () => ({ title: 'Add Rule', rows: [
  grid(Object.keys(RULE_TEMPLATES).map(k => tile(k, { compact: true, to: 'ed_newruleinstance:' + k }))),
]}),

// a rule instance: a template configured inside its owning ruleset
ed_ruleinstance: (arg = 'dmg_attack') => { const i = RULE_INSTANCES[arg]; const t = RULE_TEMPLATES[i.template]; return { title: i.template, rows: [
  list(t.params.length ? t.params.map(p => paramRow(p, 'edit', i.values || {})) : [ scalar('text', 'Parameters', 'None') ]),
  clearBtn(),
]}; },

ed_newruleinstance: (arg = 'Damage') => { const t = RULE_TEMPLATES[arg]; return { title: arg, rows: [
  list(t.params.length ? t.params.map(p => paramRow(p, 'new')) : [ scalar('text', 'Parameters', 'None') ]),
  addBtn(arg + ' Rule'),
]}; },

// picker over the Rulesets catalog
pick_rulesets: () => ({ title: 'Ruleset', rows: [
  list(Object.values(RULESETS).map(r => optRow(r.name, r.desc))),
  list([ newRow('New Ruleset', 'ed_newruleset') ]),
]}),

/* --- Match Configs --- */
cat_match_configs: () => ({ title: 'Match Configs', action: { fn: () => go('ed_newmatchconfig') }, rows: [
  list(Object.entries(MATCH_CONFIGS).map(([k, m]) => nav(m.name, { to: 'ed_matchconfig:' + k }))),
]}),

ed_matchconfig: (arg = 'default') => { const m = MATCH_CONFIGS[arg]; return { title: m.name, rows: [
  identitySec(15000, MATCH_CONFIGS, arg),
  infoSec(m.name, m.desc),
  section('Configuration'),
  list([
    ref('Ruleset', m.ruleset, 'pick_rulesets'),
    stepper('Columns', m.cols),
    stepper('Rows', m.rows),
  ]),
]}; },

ed_newmatchconfig: () => ({ title: 'New Match Config', rows: [
  section('Identity'),
  list([ scalar('text', 'ID', String(15000 + count(MATCH_CONFIGS) + 1)), scalar('text', 'Filename', 'new_match_config') ]),
  infoSec('New Match Config', '—'),
  section('Configuration'),
  list([
    ref('Ruleset', 'None', 'pick_rulesets'),
    stepper('Columns', 8),
    stepper('Rows', 8),
  ]),
  addBtn('New Match Config'),
]}),

};

/* --- kind menus (pick + return) --- */
const MENUS = {
  menu_target: ['Self', 'Opponent', 'Instigator', 'Chosen', 'Chosen Ally', 'All Entities', 'All Allies', 'All Opponents', 'Random Ally', 'Random Opponent', 'Highest Stat', 'Lowest Stat', 'Sides'],
  menu_condition: ['Stat Threshold', 'Compare Stats', 'Has Status', 'Chance', 'And', 'Or', 'Not'],
  menu_amount: ['Constant', 'Current Stat', 'Maximum Stat', 'Missing Stat', 'Random', 'Math', 'Modification', 'Status Count'],
  menu_stackrule: ['Stack', 'Replace', 'Keep Highest'],
  menu_decayrule: ['Timing', 'Threshold', 'Trigger'],
  menu_step: ['Absorb', 'Clamp', 'Flat Mitigation', 'Multiplier'],
};
const MENU_TITLES = { menu_target: 'Target', menu_condition: 'Condition', menu_amount: 'Amount', menu_stackrule: 'Stacking', menu_decayrule: 'Decay', menu_step: 'Transform' };

// descriptions for effect-system kinds — shown in pickers AND on kind pages
const KIND_DESCS = {
  Absorb: 'Spends the status’s stacks to soak an incoming value; the overflow passes through.',
  Clamp: 'Holds the value within a minimum and/or maximum range.',
  'Flat Mitigation': 'Subtracts a fixed amount from the value.',
  Multiplier: 'Scales the value by a percentage.',
  Attack: 'Deals damage to the target.',
  Shield: 'Grants Shield stacks to the target.',
  Dodge: 'Grants a chance to avoid the next hit.',
  Drain: 'Removes stacks or resource from the target.',
  'Damage Buff': 'Increases the target’s outgoing damage.',
  Disable: 'Prevents the target from acting.',
  'Apply Status': 'Applies a status to the target.',
  'Remove Status': 'Removes a specific status from the target.',
  'Remove By Type': 'Removes all buffs, or all debuffs, from the target.',
  'Modify Stat': 'Changes a stat by an amount.',
  'Set Stat': 'Sets a stat to a specific value.',
  'Drain Resource': 'Removes an ability resource from the target.',
};

const MENU_DESCS = {
  menu_stackrule: {
    'Stack': 'Each application adds a separate instance that expires on its own.',
    'Replace': 'A new application replaces the existing one, resetting its timer.',
    'Keep Highest': 'Only the strongest application is kept; weaker ones are discarded.',
    'None': 'Not yet chosen.',
  },
  menu_decayrule: {
    'Timing': 'Expires automatically after a set number of turns.',
    'Threshold': 'Expires when a tracked value crosses a limit.',
    'Trigger': 'Expires when a specific event occurs.',
    'None': 'Not yet chosen.',
  },
  menu_target: {
    'Self': 'The ship that owns the effect.',
    'Opponent': 'The enemy ship.',
    'Instigator': 'Whoever caused the triggering event.',
    'Chosen': 'A target chosen when the ability is used.',
    'Chosen Ally': 'An allied ship chosen when the ability is used.',
    'All Entities': 'Every ship in the match.',
    'All Allies': 'Every allied ship.',
    'All Opponents': 'Every enemy ship.',
    'Random Ally': 'A random allied ship.',
    'Random Opponent': 'A random enemy ship.',
    'Highest Stat': 'The ship with the highest value of a chosen stat.',
    'Lowest Stat': 'The ship with the lowest value of a chosen stat.',
    'Sides': 'Each side of the match as a whole.',
  },
  menu_condition: {
    'Stat Threshold': 'Passes when a stat is above or below a limit.',
    'Compare Stats': 'Passes when one stat compares against another.',
    'Has Status': 'Passes when the target carries a specific status.',
    'Chance': 'Passes a percentage roll.',
    'And': 'Passes when all of its child conditions pass.',
    'Or': 'Passes when any of its child conditions passes.',
    'Not': 'Inverts its child condition.',
  },
  menu_amount: {
    'Constant': 'A fixed number.',
    'Current Stat': 'The current value of a stat.',
    'Maximum Stat': 'The maximum value of a stat.',
    'Missing Stat': 'How far a stat is below its maximum.',
    'Random': 'A random number within a range.',
    'Math': 'Combines other amounts with an operation.',
    'Modification': 'The value being modified by the current event.',
    'Status Count': 'The number of stacks of a status.',
    'Maximum Weapons': 'The maximum value of the Weapons stat.',
  },
};

// every kind menu PICKS (select + return) — never a navigation to a dead-end page
for (const [id, kinds] of Object.entries(MENUS)) {
  SCREENS[id] = () => ({ title: MENU_TITLES[id], rows: [
    MENU_DESCS[id]
      ? list(kinds.map(k => optRow(k, MENU_DESCS[id][k])))
      : grid(kinds.map(k => pickTile(k))),
  ]});
}

SCREENS.menu_step = () => ({ title: 'Transform', rows: [
  list(MENUS.menu_step.map(k => optRow(k, KIND_DESCS[k]))),
]});

SCREENS.menu_action = () => ({ title: 'Action', rows: [
  section('Match'),
  list(['Attack', 'Shield', 'Dodge', 'Drain', 'Damage Buff', 'Disable'].map(k => optRow(k, KIND_DESCS[k]))),
  section('Core'),
  list(['Apply Status', 'Remove Status', 'Remove By Type', 'Modify Stat', 'Set Stat', 'Drain Resource'].map(k => optRow(k, KIND_DESCS[k]))),
]});

/* ---------- side nav (viewer aid) ---------- */
const NAV = [
  ['Primitives', [['Resources', 'cat_resources'], ['Tiles', 'cat_tiles'], ['Stats', 'cat_stats'], ['Statuses', 'cat_statuses']]],
  ['Building Blocks', [['Adjustments', 'cat_adjustments'], ['Actions', 'cat_actions'], ['Conditions', 'cat_conditions'], ['Effects', 'cat_effects'], ['Targets', 'cat_targets'], ['Transforms', 'cat_transforms']]],
  ['Content', [['Abilities', 'cat_abilities'], ['Modules', 'cat_modules'], ['Loadouts', 'cat_loadouts'], ['Starships', 'cat_starships']]],
  ['Config', [['Rules', 'cat_rules'], ['Rulesets', 'cat_rulesets'], ['Match Configs', 'cat_match_configs']]],
];

function buildNav() {
  let html = `<div class="navbrand"><span class="prompt">&gt;_</span>Debug</div>`;
  for (const [section, items] of NAV) {
    html += `<div class="nav-section">${section}</div>`;
    for (const [label, target] of items) {
      html += `<div class="nav-item" data-target="${target || label}">${label}</div>`;
    }
  }
  const nav = $('sidenav');
  nav.innerHTML = html;
  nav.querySelector('.navbrand').addEventListener('click', () => deepLink('home'));
  nav.querySelectorAll('.nav-item').forEach(el =>
    el.addEventListener('click', () => deepLink(el.dataset.target)));
}

function updateNavActive() {
  const active = stack.length > 1 ? baseOf(stack[1]) : null;   // catalog you entered through
  document.querySelectorAll('#sidenav .nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.target === active));
}

/* ---------- render ---------- */
function screenFor(id) {
  const f = SCREENS[baseOf(id)];
  return f ? f(argOf(id)) : { title: baseOf(id), rows: [] };
}

function render() {
  handlers = {}; hid = 0;
  const screen = screenFor(stack[stack.length - 1]);

  let html = stack.length > 1 ? '<div class="statusbar"></div>' : '';
  if (stack.length > 1 || screen.action) {
    // Back goes to the immediate previous screen (standard pop): catalog → editor →
    // sub-editor/selector each return to the one before, not straight to the catalog.
    let backHtml = '';
    if (stack.length > 1) {
      const backTitle = screenFor(stack[stack.length - 2]).title || 'Debug';
      backHtml = `<div class="back" data-h="${on(pop)}">‹ ${backTitle}</div>`;
    }
    const plusHtml = screen.action ? `<div class="plus" data-h="${on(screen.action.fn)}">＋</div>` : '';
    html += `<div class="navline">${backHtml}${plusHtml}</div>`;
  }
  if (screen.title) html += `<div class="bigtitle">${screen.title}</div>`;
  html += screen.rows.join('');

  const body = $('body');
  body.innerHTML = html;
  body.querySelectorAll('[data-h]').forEach(el => {
    el.addEventListener('click', ev => {
      ev.stopPropagation();
      handlers[el.dataset.h]();
    });
  });
  body.scrollTop = 0;
  updateNavActive();
}

buildNav();
render();
</script>
</body>
</html>
